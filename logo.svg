<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Disable Chrome Address Autofill logo</title>
  <desc id="desc">A browser window with a location pin and a protective slash indicating address autofill is turned off.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="110" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f1e2"/>
      <stop offset="1" stop-color="#dfeee5"/>
    </linearGradient>
    <linearGradient id="frame" x1="20" y1="18" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6c4e"/>
      <stop offset="1" stop-color="#1d4632"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#123224" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="22" y="24" width="84" height="70" rx="16" fill="#fffdfa" stroke="url(#frame)" stroke-width="6"/>
    <path d="M22 42h84" stroke="#2f6c4e" stroke-width="6" stroke-linecap="round"/>
    <circle cx="34" cy="33" r="4" fill="#d9715d"/>
    <circle cx="47" cy="33" r="4" fill="#f1bf63"/>
    <circle cx="60" cy="33" r="4" fill="#70a784"/>
  </g>
  <path d="M64 44c-11.046 0-20 8.954-20 20 0 14.679 20 33 20 33s20-18.321 20-33c0-11.046-8.954-20-20-20zm0 28a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" fill="#2d7d57"/>
  <circle cx="64" cy="64" r="7.5" fill="#fffdfa"/>
  <path d="M40 101l50-50" stroke="#cb5b46" stroke-width="10" stroke-linecap="round"/>
  <path d="M35 97l11 11" stroke="#9e3f31" stroke-width="6" stroke-linecap="round"/>
  <path d="M82 44l11 11" stroke="#9e3f31" stroke-width="6" stroke-linecap="round"/>
</svg>
