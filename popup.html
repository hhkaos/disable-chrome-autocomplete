<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Disable Form Autocomplete</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="hero">
        <div class="hero-brand">
          <img class="hero-icon" src="icons/icon-48.png" alt="">
          <div>
            <p class="eyebrow">Demo-friendly control</p>
            <h1>Form Autocomplete</h1>
          </div>
        </div>
        <p class="hero-copy">Keep forms cleaner during demos and recordings by toggling Chrome's saved address suggestions at the browser level.</p>
      </section>

      <label class="toggle-card" for="enabled-toggle">
        <div class="toggle-copy">
          <span class="toggle-label">Disable Chrome saved address suggestions</span>
          <span class="toggle-help">Uses Chrome's built-in setting. Helpful for forms, screen recordings, and live demos with no website permissions.</span>
        </div>
        <input id="enabled-toggle" type="checkbox" role="switch" aria-label="Disable Chrome saved address suggestions">
      </label>

      <section class="status-card" aria-live="polite">
        <div class="status-label">Current status</div>
        <p class="status" id="status-text">Loading Chrome setting...</p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
